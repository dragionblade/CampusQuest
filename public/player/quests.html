<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Quests - CampusQuest</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Available Quests</h1>
            <div class="user-info">
                <span id="userName">Player</span>
                <span class="points-badge" id="userPoints">0 pts</span>
                <a href="/logout">Logout</a>
            </div>
        </header>
        
        <nav>
            <a href="/player/dashboard">Dashboard</a>
            <a href="/player/quests" class="active">Available Quests</a>
            <a href="/player/my-submissions">My Submissions</a>
            <a href="/player/leaderboard">Leaderboard</a>
        </nav>
        
        <main>
            <h2>Complete Quests to Earn Points!</h2>
            <p style="color:#888;margin-bottom:20px">Select a quest, complete the task, and submit proof for review.</p>
            <div id="questsContainer">
                <div class="loading">Loading</div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
    <script>loadUserInfo(); loadQuests('questsContainer');</script>
</body>
</html>

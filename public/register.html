<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusQuest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-form">
            <div class="login-icon">🎮</div>
            <h1>Join CampusQuest</h1>
            <p class="subtitle">Create your account to start earning points</p>
            
            <div id="errorMsg" class="error" style="display:none"></div>
            <div id="successMsg" class="success" style="display:none"></div>
            
            <form id="registerForm" action="/register" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                </div>
                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role" name="role" required>
                        <option value="player">Player (Student)</option>
                        <option value="admin">Admin (Staff)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            
            <div class="auth-links">
                <p>Already have an account? <a href="/">Login here</a></p>
            </div>
        </div>
    </div>
    <script>
        // Password confirmation validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                document.getElementById('errorMsg').textContent = 'Passwords do not match';
                document.getElementById('errorMsg').style.display = 'block';
                return false;
            }
            
            if (password.length < 6) {
                e.preventDefault();
                document.getElementById('errorMsg').textContent = 'Password must be at least 6 characters';
                document.getElementById('errorMsg').style.display = 'block';
                return false;
            }
        });
        
        // Show success/error messages from URL params
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            document.getElementById('errorMsg').textContent = params.get('error');
            document.getElementById('errorMsg').style.display = 'block';
        }
        if (params.get('success')) {
            document.getElementById('successMsg').textContent = params.get('success');
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>
</html>

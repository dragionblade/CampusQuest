services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_USER: ${DB_USER:-campusquest}
      DB_PASSWORD: ${DB_PASSWORD:-campusquest_password}
      DB_NAME: ${DB_NAME:-campusquest}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-30}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-2000}
      SESSION_SECRET: ${SESSION_SECRET:-campusquest_local_session_secret}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-campusquest}
      MYSQL_USER: ${DB_USER:-campusquest}
      MYSQL_PASSWORD: ${DB_PASSWORD:-campusquest_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campusquest_root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      start_period: 3m
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
